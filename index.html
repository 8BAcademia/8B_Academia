<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Escolar</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: linear-gradient(135deg, #eaf4ff, #f7fbff);
}

/* LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.input-group {
    margin-bottom: 15px;
}

label {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 5px;
    display: block;
}

input {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: 2px solid #4da6ff;
}

input.error {
    border-color: red;
}

.error-text {
    color: red;
    font-size: 12px;
}

/* APP */
.app {
    display: none;
    padding: 20px;
}

.nav {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

button {
    padding: 10px;
    background: #4da6ff;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.tab {
    display: none;
}

.tab.active {
    display: block;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-container">
    <div class="login-box">

        <h2>Entrar</h2>

        <div class="input-group">
            <label>Nome de usuário</label>
            <input id="user">
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input id="pass" type="password">
            <div id="erro" class="error-text"></div>
        </div>

        <button onclick="login()">Entrar</button>

    </div>
</div>

<!-- APP -->
<div id="app" class="app">

    <div class="nav">
        <button onclick="trocar('pergunta')">Perguntas</button>
        <button onclick="trocar('materia')">Matéria</button>
        <button onclick="trocar('dever')">Dever</button>
    </div>

    <div id="pergunta" class="tab active">Área de perguntas</div>
    <div id="materia" class="tab">Área de matéria</div>
    <div id="dever" class="tab">Área de dever</div>

</div>

<script>
function login() {
    let senhaInput = document.getElementById("pass");
    let erro = document.getElementById("erro");

    senhaInput.classList.remove("error");
    erro.innerText = "";

    let senha = senhaInput.value;

    if (senha === "Turma8B" || senha === "8B_adm") {
        // TROCA DE TELA
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("app").style.display = "block";
    } else {
        senhaInput.classList.add("error");
        erro.innerText = "Senha incorreta, tente novamente";
    }
}

function trocar(tab) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(tab).classList.add("active");
}
</script>

</body>
</html>
