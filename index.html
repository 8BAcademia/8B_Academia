<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Escolar</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI";
    background: #f5f9ff;
}

/* ANIMAÇÃO */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 14px;
    width: 320px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    animation: fadeIn 0.4s ease;
}

/* LABEL */
.label {
    font-size: 13px;
    margin-bottom: 4px;
    color: #333;
    display: block;
}

/* INPUT */
input, textarea {
    width: 100%;
    padding: 10px;
    border: 2px solid #4da6ff;
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 14px;
    transition: 0.2s;
}

textarea {
    resize: none;
    height: 80px;
}

input:focus, textarea:focus {
    border-color: #1e90ff;
    transform: scale(1.02);
}

input.error { border-color: red; }

.erro {
    color: red;
    font-size: 13px;
}

/* BOTÕES */
button {
    cursor: pointer;
    border: none;
    transition: 0.2s;
}

button:hover { transform: scale(1.05); }
button:active { transform: scale(0.95); }

.btn-login {
    width: 100%;
    padding: 10px;
    background: #4da6ff;
    color: white;
    border-radius: 8px;
    font-weight: bold;
}

/* CRÉDITO */
.credito {
    position: fixed;
    bottom: 10px;
    right: 12px;
    font-size: 11px;
    color: #888;
    opacity: 0.7;
}

/* APP */
.app { display: none; }

.nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    background: white;
    padding: 12px;
}

.nav-item {
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
}

.nav-item.active {
    background: #4da6ff;
    color: white;
}

.content { padding: 20px; }

.tab {
    display: none;
    animation: fadeIn 0.3s ease;
}
.tab.active { display: block; }

.post {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 12px;
    animation: fadeIn 0.3s ease;
}

.post-actions {
    margin-top: 10px;
    display: flex;
    gap: 10px;
}

.btn {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
}

.btn-blue { background: #4da6ff; color: white; }
.btn-gray { background: #eee; }
.btn-red { background: #ff4d4d; color: white; }

.respostas {
    margin-top: 10px;
    border-top: 1px solid #ddd;
    padding-top: 10px;
}

.resposta {
    font-size: 13px;
    margin-bottom: 5px;
}

.responder-area {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    align-items: center;
}

.responder-area input {
    flex: 0.75;
    height: 32px;
    margin: 0;
}

.responder-area button {
    height: 32px;
    padding: 0 12px;
}

.switch-area {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 10px 0;
}

.switch {
    position: relative;
    width: 42px;
    height: 22px;
}

.switch input { display: none; }

.slider {
    position: absolute;
    inset: 0;
    background: #ccc;
    border-radius: 20px;
    transition: 0.3s;
}

.slider::before {
    content: "";
    position: absolute;
    width: 16px;
    height: 16px;
    background: white;
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: 0.3s;
}

.switch input:checked + .slider {
    background: #4da6ff;
}

.switch input:checked + .slider::before {
    transform: translateX(20px);
}

.fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #4da6ff;
    color: white;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    font-size: 26px;
}

.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: none;
    align-items: center;
    justify-content: center;
}

.modal-box {
    background: white;
    padding: 25px;
    border-radius: 14px;
    width: 340px;
}

.modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}

.empty {
    text-align: center;
    color: #888;
    margin-top: 40px;
}
</style>
</head>

<body>

<div id="loginScreen" class="login-container">
    <div class="login-box">
        <h2>Entrar</h2>

        <label class="label">Nome (favor coloque seu nome real)</label>
        <input id="user" placeholder="Digite seu nome">

        <label class="label">Senha</label>
        <input id="pass" type="password" placeholder="Digite sua senha">

        <div id="erro" class="erro"></div>

        <button class="btn-login" onclick="login()">Entrar</button>
    </div>
</div>

<div class="credito">Criado por: Hensel©</div>

<!-- resto do sistema permanece igual -->

    }

    usuario = user.value || "Usuário";
    loginScreen.style.display = "none";

</script>

</body>
</html>
