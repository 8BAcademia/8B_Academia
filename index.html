<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Escolar</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI";
    background: #f5f9ff;
}

/* ANIMAÇÃO */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 14px;
    width: 320px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    animation: fadeIn 0.4s ease;
}

.label {
    font-size: 13px;
    margin-bottom: 4px;
    display: block;
}

input, textarea {
    width: 100%;
    padding: 10px;
    border: 2px solid #4da6ff;
    border-radius: 8px;
    margin-bottom: 12px;
}

input.error { border-color: red; }

.erro {
    color: red;
    font-size: 13px;
}

.btn-login {
    width: 100%;
    padding: 10px;
    background: #4da6ff;
    color: white;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

/* CRÉDITO */
.credito {
    position: fixed;
    bottom: 10px;
    right: 12px;
    font-size: 11px;
    color: #888;
}

/* APP */
.app { display: none; }

.nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    background: white;
    padding: 12px;
}

.nav-item {
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
}

.nav-item.active {
    background: #4da6ff;
    color: white;
}

.content { padding: 20px; }

.tab { display: none; }
.tab.active { display: block; }

.post {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 12px;
}

.empty {
    text-align: center;
    color: #888;
    margin-top: 40px;
}
</style>
</head>

<body>

<div id="loginScreen" class="login-container">
    <div class="login-box">
        <h2>Entrar</h2>

        <label class="label">Nome (favor colocar seu nome real)</label>
        <input id="user" placeholder="Digite seu nome">

        <label class="label">Senha</label>
        <input id="pass" type="password" placeholder="Digite sua senha">

        <div id="erro" class="erro"></div>

        <button class="btn-login" onclick="login()">Entrar</button>
    </div>
</div>

<div class="credito">Criado por: Hensel©</div>

<div id="app" class="app">
    <div class="nav">
        <div class="nav-item active" onclick="trocar('pergunta', this)">Perguntas</div>
        <div class="nav-item" onclick="trocar('materia', this)">Matéria</div>
        <div class="nav-item" onclick="trocar('dever', this)">Dever</div>
    </div>

    <div class="content">
        <div id="pergunta" class="tab active"></div>
        <div id="materia" class="tab"></div>
        <div id="dever" class="tab"></div>
    </div>
</div>

<script>
let usuario = "";
let admin = false;
let abaAtual = "pergunta";

function login() {
    let senha = document.getElementById("pass").value;
    let erro = document.getElementById("erro");

    erro.innerText = "";

    if (senha === "Turma8B") admin = false;
    else if (senha === "8B_adm") admin = true;
    else {
        document.getElementById("pass").classList.add("error");
        erro.innerText = "Senha incorreta";
        return;
    }

    usuario = document.getElementById("user").value || "Usuário";

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";

    carregar();
}

function trocar(tab, el) {
    abaAtual = tab;

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(tab).classList.add("active");

    document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
    el.classList.add("active");
}

function carregar() {
    ["pergunta","materia","dever"].forEach(aba => {
        let lista = document.getElementById(aba);
        lista.innerHTML = "";

        let posts = JSON.parse(localStorage.getItem(aba) || "[]");

        if (posts.length === 0) {
            lista.innerHTML = `<div class="empty">Sem nenhuma postagem</div>`;
            return;
        }

        posts.forEach(p => {
            let div = document.createElement("div");
            div.className = "post";

            div.innerHTML = `
                <div><b>${p.nome}</b></div>
                <div>${p.titulo}</div>
                <div>${p.desc}</div>
            `;

            lista.appendChild(div);
        });
    });
}
</script>

</body>
</html>
