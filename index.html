<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Escolar</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI";
    background: #f5f9ff;
}

/* ANIMAÇÕES */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

/* LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 14px;
    width: 320px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    animation: fadeIn 0.4s ease;
}

.label {
    font-size: 13px;
    margin-bottom: 4px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    border: 2px solid #4da6ff;
    border-radius: 8px;
    margin-bottom: 12px;
    transition: 0.2s;
}

textarea {
    resize: none;
    height: 80px;
}

input:focus, textarea:focus {
    transform: scale(1.02);
}

input.error { border-color: red; }

.erro {
    color: red;
    font-size: 13px;
}

.btn-login {
    width: 100%;
    padding: 10px;
    background: #4da6ff;
    color: white;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

/* CRÉDITO */
.credito {
    position: fixed;
    bottom: 10px;
    right: 12px;
    font-size: 11px;
    color: #888;
}

/* APP */
.app { display: none; }

.nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    background: white;
    padding: 12px;
}

.nav-item {
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.nav-item:hover {
    background: #e6f2ff;
}

.nav-item.active {
    background: #4da6ff;
    color: white;
}

.content { padding: 20px; }

.tab {
    display: none;
}
.tab.active {
    display: block;
    animation: fadeIn 0.3s ease;
}

/* POST */
.post {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 12px;
    animation: fadeIn 0.3s ease;
}

/* BOTÕES */
.post-actions {
    margin-top: 10px;
}

.btn {
    padding: 6px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover { transform: scale(1.05); }

.btn-red { background: #ff4d4d; color: white; }

/* FAB */
.fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #4da6ff;
    color: white;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    font-size: 26px;
    border: none;
    cursor: pointer;
    animation: fadeIn 0.4s ease;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: none;
    align-items: center;
    justify-content: center;
}

.modal-box {
    background: white;
    padding: 25px;
    border-radius: 14px;
    width: 340px;
    animation: fadeIn 0.3s ease;
}

.modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}

.empty {
    text-align: center;
    color: #888;
    margin-top: 40px;
}
</style>
</head>

<body>

<div id="loginScreen" class="login-container">
    <div class="login-box">
        <h2>Entrar</h2>

        <label class="label">Nome (Favor colocar seu nome real)</label>
        <input id="user">

        <label class="label">Senha</label>
        <input id="pass" type="password">

        <div id="erro" class="erro"></div>

        <button class="btn-login" onclick="login()">Entrar</button>
    </div>
</div>

<div class="credito">Criado por: Hensel©</div>

<div id="app" class="app">

    <div class="nav">
        <div class="nav-item active" onclick="trocar('pergunta', this)">Perguntas</div>
        <div class="nav-item" onclick="trocar('materia', this)">Matéria</div>
        <div class="nav-item" onclick="trocar('dever', this)">Dever</div>
    </div>

    <div class="content">
        <div id="pergunta" class="tab active"></div>
        <div id="materia" class="tab"></div>
        <div id="dever" class="tab"></div>
    </div>

    <button id="fab" class="fab" onclick="abrirModal()">+</button>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <h3>Criar postagem</h3>

        <input id="titulo" placeholder="Título">
        <textarea id="desc" placeholder="Descrição"></textarea>

        <div id="erroPost" class="erro"></div>

        <div class="modal-actions">
            <button onclick="fecharModal()">Cancelar</button>
            <button onclick="postar()">Postar</button>
        </div>
    </div>
</div>

<script>
let usuario = "";
let admin = false;
let abaAtual = "pergunta";

function login() {
    let senha = pass.value;
    erro.innerText = "";

    if (senha === "Turma8B") admin = false;
    else if (senha === "8B_adm") admin = true;
    else {
        pass.classList.add("error");
        erro.innerText = "Senha incorreta";
        return;
    }

    usuario = user.value || "Usuário";

    loginScreen.style.display = "none";
    app.style.display = "block";

    atualizarFAB();
    carregar();
}

function trocar(tab, el) {
    abaAtual = tab;

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(tab).classList.add("active");

    document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
    el.classList.add("active");

    atualizarFAB();
}

function atualizarFAB() {
    if (abaAtual === "pergunta" || admin) {
        fab.style.display = "block";
    } else {
        fab.style.display = "none";
    }
}

function abrirModal() {
    modal.style.display = "flex";
}

function fecharModal() {
    modal.style.display = "none";
}

function postar() {
    let titulo = document.getElementById("titulo").value.trim();
    let desc = document.getElementById("desc").value.trim();

    if (!titulo || !desc) {
        erroPost.innerText = "Escreva algo antes de continuar";
        return;
    }

    let posts = JSON.parse(localStorage.getItem(abaAtual) || "[]");

    posts.unshift({ nome: usuario, titulo, desc });

    localStorage.setItem(abaAtual, JSON.stringify(posts));

    fecharModal();
    carregar();
}

function carregar() {
    ["pergunta","materia","dever"].forEach(aba => {
        let lista = document.getElementById(aba);
        lista.innerHTML = "";

        let posts = JSON.parse(localStorage.getItem(aba) || "[]");

        if (posts.length === 0) {
            lista.innerHTML = `<div class="empty">Sem nenhuma postagem</div>`;
            return;
        }

        posts.forEach((p, i) => {
            let div = document.createElement("div");
            div.className = "post";

            div.innerHTML = `
                <div><b>${p.nome}</b></div>
                <div>${p.titulo}</div>
                <div>${p.desc}</div>
            `;

            if (admin) {
                let btn = document.createElement("button");
                btn.innerText = "Excluir";
                btn.className = "btn btn-red";

                btn.onclick = () => {
                    posts.splice(i,1);
                    localStorage.setItem(aba, JSON.stringify(posts));
                    carregar();
                };

                let actions = document.createElement("div");
                actions.className = "post-actions";
                actions.appendChild(btn);

                div.appendChild(actions);
            }

            lista.appendChild(div);
        });
    });
}
</script>

</body>
</html>
