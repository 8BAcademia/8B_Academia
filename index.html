<!DOCTYPE html> 
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Site Escolar</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI";
    background: #f5f9ff;
}

/* ANIMAÇÕES */
@keyframes fadeUp {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

/* LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 14px;
    width: 320px;
    animation: fadeUp 0.4s;
}

.label { font-size: 13px; margin-bottom: 4px; }

input, textarea {
    width: 100%;
    padding: 10px;
    border: 2px solid #4da6ff;
    border-radius: 8px;
    margin-bottom: 12px;
}

textarea {
    resize: none;
}

input.error { border-color: red; }

/* BOTÕES */
.btn {
    background: #4da6ff;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    height: 36px;
}

.btn:hover { background: #1e90ff; }

/* HEADER */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    background: white;
    display: flex;
    justify-content: space-between;
    padding: 10px 20px;
}

.nav { display: flex; gap: 10px; }

.nav-item {
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
}

.nav-item.active {
    background: #4da6ff;
    color: white;
}

/* CONTENT */
.content { padding: 80px 20px; }

.tab { display: none; }
.tab.active { display: block; }

/* POST */
.post {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 12px;
    animation: fadeUp 0.3s;
}

.respostas {
    margin-top: 10px;
    padding-left: 10px;
    border-left: 2px solid #ddd;
}

.resposta {
    margin-top: 6px;
    font-size: 14px;
}

/* RESPONDER */
.responder-box {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
}

.responder-box input {
    flex: 1;
    height: 36px;
}

/* SWITCH PEQUENO */
.switch-mini {
    width: 32px;
    height: 18px;
    background: #ccc;
    border-radius: 20px;
    position: relative;
    cursor: pointer;
}

.switch-mini::after {
    content: "";
    width: 14px;
    height: 14px;
    background: white;
    position: absolute;
    top: 2px;
    left: 2px;
    border-radius: 50%;
    transition: 0.3s;
}

.switch-mini.active {
    background: #4da6ff;
}

.switch-mini.active::after {
    left: 16px;
}

/* BOTÃO CRIAR */
.create-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 14px;
    border-radius: 12px;
    background: #4da6ff;
    color: white;
    border: none;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal.active {
    display: flex;
}

.modal-box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 320px;
    animation: fadeUp 0.3s;
}

.modal-box button {
    margin-top: 12px;
}

/* MENSAGENS DE ERRO */
.msg-erro {
    color: red;
    margin-bottom: 8px;
    font-size: 13px;
}

/* RESPONSIVO PARA CELULAR */
@media (max-width: 480px) {
    body {
        font-size: 16px;
    }

    .login-box, .modal-box {
        width: 90%;
        padding: 20px;
    }

    input, textarea, .btn, .responder-box input {
        padding: 12px;
        font-size: 16px;
        height: 44px;
    }

    .nav-item {
        padding: 10px 12px;
        font-size: 14px;
    }

    .create-btn {
        padding: 18px;
        font-size: 18px;
    }

    .responder-box button {
        padding: 10px 14px;
        font-size: 14px;
    }

    .post {
        padding: 18px;
        font-size: 16px;
    }
}
</style>
</head>

<body>

<div id="loginScreen" class="login-container">
    <div class="login-box">
        <h2>Entrar</h2>

        <div class="label">Nome (Favor colocar seu nome real)</div>
        <input id="user">
        <div id="userErro" class="msg-erro"></div>

        <div class="label">Senha</div>
        <input id="pass" type="password">

        <div id="erro" class="msg-erro"></div>

        <button class="btn" onclick="login()">Entrar</button>
    </div>
</div>

<div id="app" style="display:none">

    <div class="header">
        <div class="nav">
            <div class="nav-item active" onclick="trocar('pergunta', this)">Perguntas</div>
            <div class="nav-item" onclick="trocar('materia', this)">Matéria</div>
            <div class="nav-item" onclick="trocar('dever', this)">Dever</div>
        </div>

        <div style="display:flex; align-items:center; gap:10px;">
            <span id="adminLabel" style="color:black; font-weight:bold; display:none;">ADMIN</span>
            <button class="btn" onclick="logout()">Sair</button>
        </div>
    </div>

    <div class="content">
        <div id="pergunta" class="tab active"></div>
        <div id="materia" class="tab"></div>
        <div id="dever" class="tab"></div>
    </div>

    <button class="create-btn" onclick="abrirModal()">+ Criar</button>
</div>

<div id="modal" class="modal" onclick="fecharFora(event)">
    <div class="modal-box">
        <h3>Criar postagem</h3>

        <div class="label">Título</div>
        <input id="titulo">
        <div id="tituloErro" class="msg-erro"></div>

        <div class="label">Descrição</div>
        <textarea id="desc"></textarea>
        <div id="descErro" class="msg-erro"></div>

        <div style="display:flex;justify-content:space-between;align-items:center;">
            <span>Anônimo?</span>
            <div id="anonBtn" class="switch-mini" onclick="toggleAnon()"></div>
        </div>

        <button class="btn" onclick="enviar()">Publicar</button>
    </div>
</div>

<script>
let usuario = "";
let admin = false;
let aba = "pergunta";
let anon = false;

window.onload = () => {
    let saved = JSON.parse(localStorage.getItem("login"));
    if(saved){
        usuario = saved.usuario;
        admin = saved.admin;

        if(admin){
            document.getElementById("adminLabel").style.display = "inline";
        }

        loginScreen.style.display="none";
        app.style.display="block";
        carregar();
    }
};

function login(){
    let nome = user.value.trim();
    let senha = pass.value;

    user.classList.remove("error");
    userErro.innerText="";
    erro.innerText="";

    if(!nome){
        userErro.innerText="Insira um nome de usuário válido";
        user.classList.add("error");
        return;
    }

    if(senha==="Turma8B") admin=false;
    else if(senha==="8B_adm") admin=true;
    else{
        erro.innerText="Senha incorreta";
        pass.classList.add("error");
        return;
    }

    usuario = nome;
    localStorage.setItem("login", JSON.stringify({usuario,admin}));

    if(admin){
        document.getElementById("adminLabel").style.display = "inline";
    }

    loginScreen.style.display="none";
    app.style.display="block";
    carregar();
}

function logout(){
    localStorage.removeItem("login");
    location.reload();
}

function trocar(t, el){
    aba = t;
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.getElementById(t).classList.add("active");

    document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
    el.classList.add("active");
}

function abrirModal(){ 
    tituloErro.innerText="";
    descErro.innerText="";
    titulo.classList.remove("error");
    desc.classList.remove("error");
    modal.classList.add("active"); 
}

function fecharFora(e){
    if(e.target.id==="modal") modal.classList.remove("active");
}

function toggleAnon(){
    anon = !anon;
    anonBtn.classList.toggle("active");
}

function enviar(){
    let t = titulo.value.trim();
    let d = desc.value.trim();

    tituloErro.innerText="";
    descErro.innerText="";
    titulo.classList.remove("error");
    desc.classList.remove("error");

    if(!t || !d){
        if(!t){
            tituloErro.innerText="Insira um título";
            titulo.classList.add("error");
        }
        if(!d){
            descErro.innerText="Insira uma descrição";
            desc.classList.add("error");
        }
        return;
    }

    let posts = JSON.parse(localStorage.getItem(aba)||"[]");

    posts.unshift({
        nome: anon ? "Anônimo" : usuario,
        titulo: t,
        desc: d,
        respostas: []
    });

    localStorage.setItem(aba, JSON.stringify(posts));

    titulo.value="";
    desc.value="";
    anon=false;
    anonBtn.classList.remove("active");

    modal.classList.remove("active");
    carregar();
}

function responder(index){
    let input = document.getElementById("resp-"+index);
    let texto = input.value.trim();
    let anonResp = document.getElementById("anonResp-"+index).classList.contains("active");

    if(!texto){
        alert("Escreva algo antes de continuar");
        return;
    }

    let posts = JSON.parse(localStorage.getItem(aba)||"[]");

    posts[index].respostas.push({
        nome: anonResp ? "Anônimo" : usuario,
        texto
    });

    localStorage.setItem(aba, JSON.stringify(posts));
    carregar();
}

function carregar(){
    ["pergunta","materia","dever"].forEach(a=>{
        let div = document.getElementById(a);
        div.innerHTML="";

        let posts = JSON.parse(localStorage.getItem(a)||"[]");

        if(posts.length===0){
            div.innerHTML=`<div>Sem nenhuma postagem</div>`;
            return;
        }

        posts.forEach((p,i)=>{
            let respostasHTML = "";
            p.respostas.forEach(r=>{
                respostasHTML += `<div class="resposta"><b>${r.nome}:</b> ${r.texto}</div>`;
            });

            let el = document.createElement("div");
            el.className="post";

            el.innerHTML=`
                <b>${p.nome}</b>
                <div>${p.titulo}</div>
                <div>${p.desc}</div>

                <div class="respostas">${respostasHTML}</div>

                <div class="responder-box">
                    <input id="resp-${i}" placeholder="Responder...">
                    <div id="anonResp-${i}" class="switch-mini" onclick="this.classList.toggle('active')"></div>
                    <button class="btn" onclick="responder(${i})">Enviar</button>
                </div>
            `;

            if(admin){
                let b = document.createElement("button");
                b.className="btn";
                b.innerText="Excluir";
                b.onclick=()=>{
                    posts.splice(i,1);
                    localStorage.setItem(a, JSON.stringify(posts));
                    carregar();
                };
                el.appendChild(b);
            }

            div.appendChild(el);
        });
    });
}

window.addEventListener("storage", carregar);
</script>

</body>
</html>
