<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Escolar</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI";
    background: #f5f9ff;
}

/* LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.5s ease;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 14px;
    width: 320px;
    animation: slideUp 0.4s ease;
}

/* INPUT */
.label { font-size: 13px; margin-bottom: 4px; }

input, textarea {
    width: 100%;
    padding: 10px;
    border: 2px solid #4da6ff;
    border-radius: 8px;
    margin-bottom: 12px;
    transition: 0.2s;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #1e90ff;
    transform: scale(1.02);
}

input.error { border-color: red; }

/* BOTÕES */
.btn {
    background: #4da6ff;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    background: #1e90ff;
    transform: translateY(-1px);
}

.btn:active {
    transform: scale(0.96);
}

/* HEADER */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    background: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    animation: slideDown 0.3s;
}

.nav {
    display: flex;
    gap: 10px;
}

.nav-item {
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.nav-item:hover {
    background: #e6f2ff;
}

.nav-item.active {
    background: #4da6ff;
    color: white;
}

/* CONTENT */
.content {
    padding: 80px 20px;
}

.tab {
    display: none;
    opacity: 0;
    transform: translateY(10px);
}

.tab.active {
    display: block;
    animation: tabAnim 0.3s forwards;
}

/* POSTS */
.post {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
    opacity: 0;
    transform: translateY(10px);
    animation: postAnim 0.4s forwards;
}

.empty {
    text-align: center;
    color: #888;
}

/* BOTÃO CRIAR */
.create-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #4da6ff;
    color: white;
    border: none;
    padding: 14px 18px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
}

.create-btn:hover {
    transform: scale(1.1);
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal.active {
    display: flex;
    animation: fadeIn 0.2s;
}

.modal-box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 320px;
    animation: modalAnim 0.3s;
}

.row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* ANIMAÇÕES */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@keyframes slideDown {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@keyframes tabAnim {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes postAnim {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes modalAnim {
    from {
        transform: scale(0.9);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}
</style>
</head>

<body>

<div id="loginScreen" class="login-container">
    <div class="login-box">
        <h2>Entrar</h2>

        <div class="label">Nome (Favor colocar seu nome real)</div>
        <input id="user">

        <div class="label">Senha</div>
        <input id="pass" type="password">

        <div id="erro" style="color:red;"></div>

        <button class="btn" onclick="login()">Entrar</button>
    </div>
</div>

<div id="app" style="display:none">

    <div class="header">
        <div class="nav">
            <div class="nav-item active" onclick="trocar('pergunta', this)">Perguntas</div>
            <div class="nav-item" onclick="trocar('materia', this)">Matéria</div>
            <div class="nav-item" onclick="trocar('dever', this)">Dever</div>
        </div>

        <button class="btn" onclick="logout()">Sair</button>
    </div>

    <div class="content">
        <div id="pergunta" class="tab active"></div>
        <div id="materia" class="tab"></div>
        <div id="dever" class="tab"></div>
    </div>

    <button class="create-btn" onclick="abrirModal()">+ Criar</button>
</div>

<div id="modal" class="modal" onclick="fecharFora(event)">
    <div class="modal-box">
        <h3>Criar postagem</h3>

        <div class="label">Título</div>
        <input id="titulo">

        <div class="label">Descrição</div>
        <textarea id="desc"></textarea>

        <div class="row">
            <span>Anônimo?</span>
            <input type="checkbox" id="anon">
        </div>

        <button class="btn" onclick="enviar()">Publicar</button>
    </div>
</div>

<script>
let usuario = "";
let admin = false;
let aba = "pergunta";

window.onload = () => {
    let saved = JSON.parse(localStorage.getItem("login"));
    if(saved){
        usuario = saved.usuario;
        admin = saved.admin;
        loginScreen.style.display="none";
        app.style.display="block";
        carregar();
    }
};

function login(){
    let senha = pass.value;

    if(senha==="Turma8B") admin=false;
    else if(senha==="8B_adm") admin=true;
    else{
        erro.innerText="Senha incorreta";
        pass.classList.add("error");
        return;
    }

    usuario = user.value || "Usuário";

    localStorage.setItem("login", JSON.stringify({usuario,admin}));

    loginScreen.style.display="none";
    app.style.display="block";

    carregar();
}

function logout(){
    localStorage.removeItem("login");
    location.reload();
}

function trocar(t, el){
    aba = t;

    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.getElementById(t).classList.add("active");

    document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
    el.classList.add("active");
}

function abrirModal(){
    modal.classList.add("active");
}

function fecharFora(e){
    if(e.target.id==="modal"){
        modal.classList.remove("active");
    }
}

function enviar(){
    let t = titulo.value.trim();
    let d = desc.value.trim();

    if(!t || !d){
        alert("Escreva algo antes de continuar");
        return;
    }

    let posts = JSON.parse(localStorage.getItem(aba)||"[]");

    posts.unshift({
        nome: anon.checked ? "Anônimo" : usuario,
        titulo: t,
        desc: d
    });

    localStorage.setItem(aba, JSON.stringify(posts));

    titulo.value="";
    desc.value="";
    anon.checked=false;

    modal.classList.remove("active");
    carregar();
}

function carregar(){
    ["pergunta","materia","dever"].forEach(a=>{
        let div = document.getElementById(a);
        div.innerHTML="";

        let posts = JSON.parse(localStorage.getItem(a)||"[]");

        if(posts.length===0){
            div.innerHTML=`<div class="empty">Sem nenhuma postagem</div>`;
            return;
        }

        posts.forEach((p,i)=>{
            let el = document.createElement("div");
            el.className="post";

            el.style.animationDelay = (i * 0.05) + "s";

            el.innerHTML=`
                <b>${p.nome}</b>
                <div>${p.titulo}</div>
                <div>${p.desc}</div>
            `;

            if(admin){
                let b = document.createElement("button");
                b.className="btn";
                b.innerText="Excluir";

                b.onclick=()=>{
                    posts.splice(i,1);
                    localStorage.setItem(a, JSON.stringify(posts));
                    carregar();
                };

                el.appendChild(b);
            }

            div.appendChild(el);
        });
    });
}

window.addEventListener("storage", carregar);
</script>

</body>
</html>
