<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Escolar</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI";
    background: #f5f9ff;
}

/* LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

input {
    width: 100%;
    padding: 8px;
    border: 2px solid #4da6ff;
    border-radius: 6px;
    margin-bottom: 10px;
}

input.error {
    border-color: red;
}

button {
    background: #4da6ff;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

/* APP */
.app {
    display: none;
}

.nav {
    background: white;
    padding: 10px;
    display: flex;
    gap: 10px;
}

.content {
    padding: 20px;
}

.post {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* BOTÃO */
.fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #4da6ff;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    font-size: 24px;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: none;
    align-items: center;
    justify-content: center;
}

.modal-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-container">
    <div class="login-box">
        <h2>Entrar</h2>
        <input id="user" placeholder="Seu nome">
        <input id="pass" type="password" placeholder="Senha">
        <button onclick="login()">Entrar</button>
        <div id="erro" style="color:red"></div>
    </div>
</div>

<!-- APP -->
<div id="app" class="app">

    <div class="nav">
        <button onclick="trocar('pergunta')">Perguntas</button>
    </div>

    <div class="content">
        <div id="pergunta"></div>
    </div>

    <button class="fab" onclick="abrirModal()">+</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-box">
        <h3>Criar postagem</h3>
        <input id="titulo" placeholder="Título">
        <textarea id="desc" placeholder="Descrição"></textarea>
        <label>
            <input type="checkbox" id="anon"> Anônimo
        </label>
        <button onclick="postar()">Postar</button>
        <button onclick="fecharModal()">Cancelar</button>
    </div>
</div>

<script>
let usuario = "";

/* LOGIN */
function login() {
    let senha = document.getElementById("pass");
    let erro = document.getElementById("erro");

    senha.classList.remove("error");
    erro.innerText = "";

    if (senha.value === "Turma8B" || senha.value === "8B_adm") {
        usuario = document.getElementById("user").value || "Usuário";

        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("app").style.display = "block";

        carregarPosts();
    } else {
        senha.classList.add("error");
        erro.innerText = "Senha incorreta, tente novamente";
    }
}

/* MODAL */
function abrirModal() {
    document.getElementById("modal").style.display = "flex";
}

function fecharModal() {
    document.getElementById("modal").style.display = "none";
}

/* POSTS */
function postar() {
    let titulo = document.getElementById("titulo").value;
    let desc = document.getElementById("desc").value;
    let anon = document.getElementById("anon").checked;

    if (!titulo || !desc) return;

    let nome = anon ? "Anônimo" : usuario;

    let posts = JSON.parse(localStorage.getItem("posts") || "[]");

    posts.unshift({ titulo, desc, nome });

    localStorage.setItem("posts", JSON.stringify(posts));

    fecharModal();
    carregarPosts();
}

/* CARREGAR */
function carregarPosts() {
    let lista = document.getElementById("pergunta");
    lista.innerHTML = "";

    let posts = JSON.parse(localStorage.getItem("posts") || "[]");

    posts.forEach(p => {
        let div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `
    <div style="font-size:13px; color:#555;">${p.nome}</div>
    <div style="font-size:16px; font-weight:bold; margin:5px 0;">${p.titulo}</div>
    <div style="font-size:14px;">${p.desc}</div>
`;
        lista.appendChild(div);
    });
}

/* SINCRONIZAR ENTRE ABAS */
window.addEventListener("storage", function(e) {
    if (e.key === "posts") {
        carregarPosts();
    }
});
</script>

</body>
</html>
