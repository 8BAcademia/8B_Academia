<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Escolar</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI";
    background: #f5f9ff;
}

/* LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 14px;
    width: 320px;
}

.label {
    font-size: 13px;
    margin-bottom: 4px;
}

input {
    width: 100%;
    padding: 10px;
    border: 2px solid #4da6ff;
    border-radius: 8px;
    margin-bottom: 12px;
}

input.error { border-color: red; }

.btn-login {
    width: 100%;
    padding: 10px;
    background: #4da6ff;
    color: white;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

/* APP */
.app { display: none; }

.topbar {
    display: flex;
    justify-content: flex-end;
    padding: 10px;
}

.btn-logout {
    background: #ff4d4d;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
}

.nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    background: white;
    padding: 12px;
}

.nav-item {
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
}

.nav-item.active {
    background: #4da6ff;
    color: white;
}

.content { padding: 20px; }

.tab { display: none; }
.tab.active { display: block; }

.post {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 12px;
}

.empty {
    text-align: center;
    color: #888;
    margin-top: 40px;
}

/* FAB */
.fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #4da6ff;
    color: white;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    font-size: 26px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="loginScreen" class="login-container">
    <div class="login-box">
        <h2>Entrar</h2>

        <label class="label">Nome</label>
        <input id="user">

        <label class="label">Senha</label>
        <input id="pass" type="password">

        <div id="erro" style="color:red;"></div>

        <button class="btn-login" onclick="login()">Entrar</button>
    </div>
</div>

<div id="app" class="app">

    <div class="topbar">
        <button class="btn-logout" onclick="logout()">Sair</button>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="trocar('pergunta', this)">Perguntas</div>
        <div class="nav-item" onclick="trocar('materia', this)">Matéria</div>
        <div class="nav-item" onclick="trocar('dever', this)">Dever</div>
    </div>

    <div class="content">
        <div id="pergunta" class="tab active"></div>
        <div id="materia" class="tab"></div>
        <div id="dever" class="tab"></div>
    </div>

    <button id="fab" class="fab" onclick="postar()">+</button>
</div>

<script>
let usuario = "";
let admin = false;
let abaAtual = "pergunta";

/* AUTO LOGIN */
window.onload = () => {
    let saved = JSON.parse(localStorage.getItem("login"));

    if (saved) {
        usuario = saved.usuario;
        admin = saved.admin;

        loginScreen.style.display = "none";
        app.style.display = "block";

        carregar();
    }
};

function login() {
    let senha = pass.value;
    erro.innerText = "";

    if (senha === "Turma8B") admin = false;
    else if (senha === "8B_adm") admin = true;
    else {
        pass.classList.add("error");
        erro.innerText = "Senha incorreta";
        return;
    }

    usuario = user.value || "Usuário";

    localStorage.setItem("login", JSON.stringify({
        usuario,
        admin
    }));

    loginScreen.style.display = "none";
    app.style.display = "block";

    carregar();
}

function logout() {
    localStorage.removeItem("login");
    location.reload();
}

function trocar(tab, el) {
    abaAtual = tab;

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(tab).classList.add("active");

    document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
    el.classList.add("active");
}

function postar() {
    let titulo = prompt("Título:");
    let desc = prompt("Descrição:");

    if (!titulo || !desc || !titulo.trim() || !desc.trim()) {
        alert("Escreva algo antes de continuar");
        return;
    }

    let posts = JSON.parse(localStorage.getItem(abaAtual) || "[]");

    posts.unshift({
        nome: usuario,
        titulo,
        desc
    });

    localStorage.setItem(abaAtual, JSON.stringify(posts));
    carregar();
}

function carregar() {
    ["pergunta","materia","dever"].forEach(aba => {
        let lista = document.getElementById(aba);
        lista.innerHTML = "";

        let posts = JSON.parse(localStorage.getItem(aba) || "[]");

        if (posts.length === 0) {
            lista.innerHTML = `<div class="empty">Sem nenhuma postagem</div>`;
            return;
        }

        posts.forEach((p, i) => {
            let div = document.createElement("div");
            div.className = "post";

            div.innerHTML = `
                <b>${p.nome}</b>
                <div>${p.titulo}</div>
                <div>${p.desc}</div>
            `;

            if (admin) {
                let btn = document.createElement("button");
                btn.innerText = "Excluir";

                btn.onclick = () => {
                    posts.splice(i,1);
                    localStorage.setItem(aba, JSON.stringify(posts));
                    carregar();
                };

                div.appendChild(btn);
            }

            lista.appendChild(div);
        });
    });
}

/* SINCRONIZA ENTRE ABAS */
window.addEventListener("storage", () => {
    carregar();
});
</script>

</body>
</html>
