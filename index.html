<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Escolar</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI";
    background: #f5f9ff;
}

/* LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 14px;
    width: 320px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}

input, textarea {
    width: 100%;
    padding: 10px;
    border: 2px solid #4da6ff;
    border-radius: 8px;
    margin-bottom: 10px;
}

input.error { border-color: red; }

.erro {
    color: red;
    font-size: 13px;
    margin-bottom: 10px;
}

.btn-login {
    width: 100%;
    padding: 10px;
    background: #4da6ff;
    color: white;
    border-radius: 8px;
    font-weight: bold;
}

/* APP */
.app { display: none; }

.nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    background: white;
    padding: 12px;
}

.nav-item {
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
}

.nav-item.active {
    background: #4da6ff;
    color: white;
}

.content { padding: 20px; }

.tab { display: none; }
.tab.active { display: block; }

/* POST */
.post {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 12px;
}

/* BOTÕES */
.post-actions {
    margin-top: 10px;
    display: flex;
    gap: 10px;
}

.btn {
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    border: none;
}

.btn-blue { background: #4da6ff; color: white; }
.btn-gray { background: #eee; }
.btn-red { background: #ff4d4d; color: white; }

/* RESPOSTAS */
.respostas {
    margin-top: 10px;
    border-top: 1px solid #ddd;
    padding-top: 10px;
}

.resposta {
    font-size: 13px;
    margin-bottom: 5px;
}

/* INPUT RESPOSTA */
.responder-area {
    margin-top: 10px;
    display: flex;
    gap: 5px;
}

.responder-area input {
    flex: 1;
    padding: 6px;
    border-radius: 6px;
    border: 2px solid #4da6ff;
}

.responder-area input.error {
    border-color: red;
}

.responder-area button {
    padding: 6px 10px;
}

/* FAB */
.fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #4da6ff;
    color: white;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    font-size: 26px;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: none;
    align-items: center;
    justify-content: center;
}

.modal-box {
    background: white;
    padding: 25px;
    border-radius: 14px;
    width: 340px;
}

.modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}
</style>
</head>

<body>

<div id="loginScreen" class="login-container">
    <div class="login-box">
        <h2>Entrar</h2>

        <input id="user" placeholder="Nome">
        <input id="pass" type="password" placeholder="Senha">
        <div id="erro" class="erro"></div>

        <button class="btn-login" onclick="login()">Entrar</button>
    </div>
</div>

<div id="app" class="app">

    <div class="nav">
        <div class="nav-item active" onclick="trocar('pergunta', this)">Perguntas</div>
        <div class="nav-item" onclick="trocar('materia', this)">Matéria</div>
        <div class="nav-item" onclick="trocar('dever', this)">Dever</div>
    </div>

    <div class="content">
        <div id="pergunta" class="tab active"></div>
        <div id="materia" class="tab"></div>
        <div id="dever" class="tab"></div>
    </div>

    <button id="fab" class="fab" onclick="abrirModal()">+</button>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <h2>Criar postagem</h2>

        <input id="titulo" placeholder="Qual o título da postagem?">
        <textarea id="desc" placeholder="Escreva sua dúvida aqui"></textarea>

        <label>
            <input type="checkbox" id="anon"> Anônimo
        </label>

        <div id="erroPost" class="erro"></div>

        <div class="modal-actions">
            <button class="btn btn-gray" onclick="fecharModal()">Cancelar</button>
            <button class="btn btn-blue" onclick="postar()">Postar</button>
        </div>
    </div>
</div>

<script>
let usuario = "";
let admin = false;
let abaAtual = "pergunta";

function login() {
    let senha = pass.value;
    erro.innerText = "";

    if (senha === "Turma8B") admin = false;
    else if (senha === "8B_adm") admin = true;
    else {
        pass.classList.add("error");
        erro.innerText = "Senha incorreta";
        return;
    }

    usuario = user.value || "Usuário";
    loginScreen.style.display = "none";
    app.style.display = "block";

    carregar();
}

function trocar(tab, el) {
    abaAtual = tab;

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(tab).classList.add("active");

    document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
    el.classList.add("active");

    atualizarFAB();
}

function atualizarFAB() {
    fab.style.display = (abaAtual === "pergunta" || admin) ? "block" : "none";
}

function abrirModal() { modal.style.display = "flex"; }
function fecharModal() { modal.style.display = "none"; }

function postar() {
    let titulo = document.getElementById("titulo").value.trim();
    let desc = document.getElementById("desc").value.trim();

    if (!titulo || !desc) {
        erroPost.innerText = "Escreva algo antes de continuar";
        return;
    }

    let nome = anon.checked ? "Anônimo" : usuario;

    let posts = JSON.parse(localStorage.getItem(abaAtual) || "[]");

    posts.unshift({ nome, titulo, desc, respostas: [] });

    localStorage.setItem(abaAtual, JSON.stringify(posts));

    fecharModal();
    carregar();
}

function responder(index, input) {
    let texto = input.value.trim();

    if (!texto) {
        input.classList.add("error");
        return;
    }

    let posts = JSON.parse(localStorage.getItem("pergunta") || "[]");

    posts[index].respostas.push({
        nome: usuario,
        texto
    });

    localStorage.setItem("pergunta", JSON.stringify(posts));
    carregar();
}

function carregar() {
    ["pergunta","materia","dever"].forEach(aba => {
        let lista = document.getElementById(aba);
        lista.innerHTML = "";

        let posts = JSON.parse(localStorage.getItem(aba) || "[]");

        if (posts.length === 0) {
            lista.innerHTML = `<div class="empty">Sem nenhuma postagem</div>`;
            return;
        }

        posts.forEach((p, i) => {
            let div = document.createElement("div");
            div.className = "post";

            div.innerHTML = `
                <div style="font-size:13px;color:#555;">${p.nome}</div>
                <div style="font-weight:bold;">${p.titulo}</div>
                <div>${p.desc}</div>
            `;

            let actions = document.createElement("div");
            actions.className = "post-actions";

            if (aba === "pergunta") {
                let respBtn = document.createElement("button");
                respBtn.innerText = "Responder";
                respBtn.className = "btn btn-gray";
                actions.appendChild(respBtn);
            }

            if (admin) {
                let del = document.createElement("button");
                del.innerText = "Excluir";
                del.className = "btn btn-red";
                del.onclick = () => {
                    posts.splice(i,1);
                    localStorage.setItem(aba, JSON.stringify(posts));
                    carregar();
                };
                actions.appendChild(del);
            }

            div.appendChild(actions);

            if (aba === "pergunta") {
                let respostasDiv = document.createElement("div");
                respostasDiv.className = "respostas";

                (p.respostas || []).forEach(r => {
                    let rDiv = document.createElement("div");
                    rDiv.className = "resposta";
                    rDiv.innerText = `${r.nome}: ${r.texto}`;
                    respostasDiv.appendChild(rDiv);
                });

                let area = document.createElement("div");
                area.className = "responder-area";

                let input = document.createElement("input");
                input.placeholder = "Escreva uma resposta...";

                let btn = document.createElement("button");
                btn.innerText = "Enviar";
                btn.className = "btn btn-blue";
                btn.onclick = () => responder(i, input);

                area.appendChild(input);
                area.appendChild(btn);

                respostasDiv.appendChild(area);
                div.appendChild(respostasDiv);
            }

            lista.appendChild(div);
        });
    });

    atualizarFAB();
}

window.addEventListener("storage", carregar);
</script>

</body>
</html>
