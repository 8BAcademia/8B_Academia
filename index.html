<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Escolar</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI";
    background: #f5f9ff;
}

/* LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 14px;
    width: 320px;
}

.label { font-size: 13px; margin-bottom: 4px; }

input, textarea {
    width: 100%;
    padding: 10px;
    border: 2px solid #4da6ff;
    border-radius: 8px;
    margin-bottom: 12px;
    transition: 0.2s;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #1e90ff;
}

input.error { border-color: red; }

/* BOTÕES */
.btn {
    background: #4da6ff;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover { background: #1e90ff; }
.btn:active { transform: scale(0.95); }

/* HEADER */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    background: white;
    display: flex;
    justify-content: space-between;
    padding: 10px 20px;
}

.nav {
    display: flex;
    gap: 10px;
}

.nav-item {
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
}

.nav-item.active {
    background: #4da6ff;
    color: white;
}

/* CONTENT */
.content {
    padding: 80px 20px;
}

.tab { display: none; }
.tab.active {
    display: block;
    animation: fadeIn 0.3s;
}

/* POST */
.post {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 12px;
    animation: slideUp 0.3s;
}

.respostas {
    margin-top: 10px;
    padding-left: 10px;
    border-left: 2px solid #ddd;
}

.resposta {
    margin-top: 6px;
    font-size: 14px;
    animation: fadeIn 0.2s;
}

.responder-box {
    display: flex;
    gap: 6px;
    margin-top: 8px;
}

.responder-box input {
    flex: 1;
}

/* BOTÃO CRIAR */
.create-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #4da6ff;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal.active {
    display: flex;
}

.modal-box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 320px;
    animation: zoom 0.3s;
}

/* SWITCH (ANÔNIMO) */
.switch {
    width: 40px;
    height: 22px;
    background: #ccc;
    border-radius: 20px;
    position: relative;
    cursor: pointer;
    transition: 0.3s;
}

.switch::after {
    content: "";
    width: 18px;
    height: 18px;
    background: white;
    position: absolute;
    top: 2px;
    left: 2px;
    border-radius: 50%;
    transition: 0.3s;
}

.switch.active {
    background: #4da6ff;
}

.switch.active::after {
    left: 20px;
}

/* ANIMAÇÕES */
@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

@keyframes slideUp {
    from {transform:translateY(10px);opacity:0;}
    to {transform:translateY(0);opacity:1;}
}

@keyframes zoom {
    from {transform:scale(0.9);opacity:0;}
    to {transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<div id="loginScreen" class="login-container">
    <div class="login-box">
        <h2>Entrar</h2>

        <div class="label">Nome</div>
        <input id="user">

        <div class="label">Senha</div>
        <input id="pass" type="password">

        <div id="erro" style="color:red;"></div>

        <button class="btn" onclick="login()">Entrar</button>
    </div>
</div>

<div id="app" style="display:none">

    <div class="header">
        <div class="nav">
            <div class="nav-item active" onclick="trocar('pergunta', this)">Perguntas</div>
            <div class="nav-item" onclick="trocar('materia', this)">Matéria</div>
            <div class="nav-item" onclick="trocar('dever', this)">Dever</div>
        </div>

        <button class="btn" onclick="logout()">Sair</button>
    </div>

    <div class="content">
        <div id="pergunta" class="tab active"></div>
        <div id="materia" class="tab"></div>
        <div id="dever" class="tab"></div>
    </div>

    <button class="create-btn" onclick="abrirModal()">+ Criar</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="fecharFora(event)">
    <div class="modal-box">
        <h3>Criar postagem</h3>

        <div class="label">Título</div>
        <input id="titulo">

        <div class="label">Descrição</div>
        <textarea id="desc"></textarea>

        <div style="display:flex;justify-content:space-between;align-items:center;">
            <span>Anônimo?</span>
            <div id="switch" class="switch" onclick="toggleAnon()"></div>
        </div>

        <button class="btn" onclick="enviar()">Publicar</button>
    </div>
</div>

<script>
let usuario = "";
let admin = false;
let aba = "pergunta";
let anon = false;

/* LOGIN AUTO */
window.onload = () => {
    let saved = JSON.parse(localStorage.getItem("login"));
    if(saved){
        usuario = saved.usuario;
        admin = saved.admin;
        loginScreen.style.display="none";
        app.style.display="block";
        carregar();
    }
};

function login(){
    let senha = pass.value;

    if(senha==="Turma8B") admin=false;
    else if(senha==="8B_adm") admin=true;
    else{
        erro.innerText="Senha incorreta";
        pass.classList.add("error");
        return;
    }

    usuario = user.value || "Usuário";

    localStorage.setItem("login", JSON.stringify({usuario,admin}));

    loginScreen.style.display="none";
    app.style.display="block";

    carregar();
}

function logout(){
    localStorage.removeItem("login");
    location.reload();
}

function trocar(t, el){
    aba = t;

    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.getElementById(t).classList.add("active");

    document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
    el.classList.add("active");
}

/* SWITCH */
function toggleAnon(){
    anon = !anon;
    switch.classList.toggle("active");
}

/* MODAL */
function abrirModal(){
    modal.classList.add("active");
}

function fecharFora(e){
    if(e.target.id==="modal"){
        modal.classList.remove("active");
    }
}

/* POST */
function enviar(){
    let t = titulo.value.trim();
    let d = desc.value.trim();

    if(!t || !d){
        alert("Escreva algo antes de continuar");
        return;
    }

    let posts = JSON.parse(localStorage.getItem(aba)||"[]");

    posts.unshift({
        nome: anon ? "Anônimo" : usuario,
        titulo: t,
        desc: d,
        respostas: []
    });

    localStorage.setItem(aba, JSON.stringify(posts));

    titulo.value="";
    desc.value="";
    anon=false;
    switch.classList.remove("active");

    modal.classList.remove("active");
    carregar();
}

/* RESPONDER */
function responder(index){
    let input = document.getElementById("resp-"+index);
    let texto = input.value.trim();

    if(!texto){
        alert("Escreva algo antes de continuar");
        return;
    }

    let posts = JSON.parse(localStorage.getItem(aba)||"[]");

    posts[index].respostas.push({
        nome: usuario,
        texto
    });

    localStorage.setItem(aba, JSON.stringify(posts));
    carregar();
}

/* CARREGAR */
function carregar(){
    ["pergunta","materia","dever"].forEach(a=>{
        let div = document.getElementById(a);
        div.innerHTML="";

        let posts = JSON.parse(localStorage.getItem(a)||"[]");

        if(posts.length===0){
            div.innerHTML=`<div class="empty">Sem nenhuma postagem</div>`;
            return;
        }

        posts.forEach((p,i)=>{
            let el = document.createElement("div");
            el.className="post";

            let respostasHTML = "";

            p.respostas.forEach(r=>{
                respostasHTML += `<div class="resposta"><b>${r.nome}:</b> ${r.texto}</div>`;
            });

            el.innerHTML=`
                <b>${p.nome}</b>
                <div>${p.titulo}</div>
                <div>${p.desc}</div>

                <div class="respostas">${respostasHTML}</div>

                <div class="responder-box">
                    <input id="resp-${i}" placeholder="Escreva uma resposta...">
                    <button class="btn" onclick="responder(${i})">Responder</button>
                </div>
            `;

            if(admin){
                let b = document.createElement("button");
                b.className="btn";
                b.innerText="Excluir";

                b.onclick=()=>{
                    posts.splice(i,1);
                    localStorage.setItem(a, JSON.stringify(posts));
                    carregar();
                };

                el.appendChild(b);
            }

            div.appendChild(el);
        });
    });
}

window.addEventListener("storage", carregar);
</script>

</body>
</html>
