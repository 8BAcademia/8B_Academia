<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Escolar</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: linear-gradient(135deg, #eaf4ff, #f7fbff);
}

/* LOGIN CARD */
.login-container {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h2 {
    margin-bottom: 20px;
}

/* INPUT GROUP */
.input-group {
    margin-bottom: 15px;
}

label {
    font-size: 13px;
    font-weight: 600;
    display: block;
    margin-bottom: 5px;
    color: #333;
}

input {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: 2px solid #4da6ff;
    outline: none;
    font-size: 14px;
    transition: 0.2s;
}

input:focus {
    border-color: #3399ff;
}

/* ERRO */
input.error {
    border-color: red;
}

.error-text {
    color: red;
    font-size: 12px;
    margin-top: 5px;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 10px;
    background: #4da6ff;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    background: #3399ff;
}
</style>
</head>

<body>

<div class="login-container">
    <div class="login-box">

        <h2>Entrar</h2>

        <div class="input-group">
            <label>Nome de usuário</label>
            <input id="user">
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input id="pass" type="password">
            <div id="erro" class="error-text"></div>
        </div>

        <button onclick="login()">Entrar</button>

    </div>
</div>

<script>
function login() {
    let senha = document.getElementById("pass");
    let erro = document.getElementById("erro");

    senha.classList.remove("error");
    erro.innerText = "";

    if (senha.value === "Turma8B" || senha.value === "8B_adm") {
        alert("Login realizado (simulado)");
    } else {
        senha.classList.add("error");
        erro.innerText = "Senha incorreta, tente novamente";
    }
}
</script>

</body>
</html>
