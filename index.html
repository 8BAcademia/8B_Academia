<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Escolar</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Segoe UI";
    background: #f5f9ff;
}

/* LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 14px;
    width: 320px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}

.login-box h2 {
    margin-bottom: 20px;
}

label {
    font-size: 13px;
    font-weight: 600;
}

input, textarea {
    width: 100%;
    padding: 10px;
    border: 2px solid #4da6ff;
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 14px;
    outline: none;
}

input.error {
    border-color: red;
}

.erro {
    color: red;
    font-size: 13px;
    margin-bottom: 10px;
}

/* BOTÃO LOGIN */
.btn-login {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, #4da6ff, #66b3ff);
    color: white;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.2s;
}

.btn-login:hover {
    transform: scale(1.02);
}

/* APP */
.app { display: none; }

/* NAV */
.nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    background: white;
    padding: 12px;
}

.nav-item {
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
}

.nav-item.active {
    background: #4da6ff;
    color: white;
}

/* CONTEÚDO */
.content {
    padding: 20px;
}

.tab { display: none; }
.tab.active { display: block; }

/* POST */
.post {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.post .respostas {
    margin-top: 10px;
    padding-left: 10px;
    border-left: 2px solid #ddd;
}

.resposta {
    font-size: 13px;
    margin-top: 5px;
}

.empty {
    text-align: center;
    color: #777;
    margin-top: 40px;
}

/* BOTÃO + */
.fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #4da6ff;
    color: white;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    font-size: 26px;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: none;
    align-items: center;
    justify-content: center;
}

.modal-box {
    background: white;
    padding: 25px;
    border-radius: 14px;
    width: 340px;
}

.form-group {
    margin-bottom: 15px;
}

.switch-area {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}

.btn-primary {
    background: #4da6ff;
    color: white;
    padding: 8px 14px;
    border-radius: 8px;
}

.btn-secondary {
    background: #ddd;
    padding: 8px 14px;
    border-radius: 8px;
}

.responder-btn {
    margin-top: 10px;
    font-size: 12px;
    background: #eee;
    padding: 4px 8px;
    border-radius: 6px;
}
</style>
</head>

<body>

<div id="loginScreen" class="login-container">
    <div class="login-box">
        <h2>Entrar</h2>

        <label>Nome</label>
        <input id="user">

        <label>Senha</label>
        <input id="pass" type="password">
        <div id="erro" class="erro"></div>

        <button class="btn-login" onclick="login()">Entrar</button>
    </div>
</div>

<div id="app" class="app">

    <div class="nav">
        <div class="nav-item active" onclick="trocar('pergunta', this)">Perguntas</div>
        <div class="nav-item" onclick="trocar('materia', this)">Matéria</div>
        <div class="nav-item" onclick="trocar('dever', this)">Dever</div>
    </div>

    <div class="content">
        <div id="pergunta" class="tab active"></div>
        <div id="materia" class="tab"></div>
        <div id="dever" class="tab"></div>
    </div>

    <button id="fab" class="fab" onclick="abrirModal()">+</button>
</div>

<div id="modal" class="modal">
    <div class="modal-box">

        <h2>Criar postagem</h2>

        <div class="form-group">
            <label>Título</label>
            <input id="titulo">
        </div>

        <div class="form-group">
            <label>Descrição</label>
            <textarea id="desc"></textarea>
        </div>

        <div class="switch-area">
            <span>Anônimo</span>
            <input type="checkbox" id="anon">
        </div>

        <div class="modal-actions">
            <button class="btn-secondary" onclick="fecharModal()">Cancelar</button>
            <button class="btn-primary" onclick="postar()">Postar</button>
        </div>

    </div>
</div>

<script>
let usuario = "";
let admin = false;
let abaAtual = "pergunta";

function login() {
    let senha = document.getElementById("pass");
    let erro = document.getElementById("erro");

    senha.classList.remove("error");
    erro.innerText = "";

    if (senha.value === "Turma8B") {
        admin = false;
    } else if (senha.value === "8B_adm") {
        admin = true;
    } else {
        senha.classList.add("error");
        erro.innerText = "Senha incorreta, tente novamente";
        return;
    }

    usuario = document.getElementById("user").value || "Usuário";

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";

    carregarTudo();
}

function trocar(tab, el) {
    abaAtual = tab;

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(tab).classList.add("active");

    document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
    el.classList.add("active");

    atualizarFAB();
}

function atualizarFAB() {
    let fab = document.getElementById("fab");

    if (abaAtual === "pergunta") {
        fab.style.display = "block";
    } else if (admin) {
        fab.style.display = "block";
    } else {
        fab.style.display = "none";
    }
}

function abrirModal() {
    document.getElementById("modal").style.display = "flex";
}

function fecharModal() {
    document.getElementById("modal").style.display = "none";
}

function postar() {
    let titulo = document.getElementById("titulo").value;
    let desc = document.getElementById("desc").value;
    let anon = document.getElementById("anon").checked;

    if (!titulo || !desc) return;

    let nome = anon ? "Anônimo" : usuario;

    let posts = JSON.parse(localStorage.getItem(abaAtual) || "[]");

    posts.unshift({ nome, titulo, desc, respostas: [] });

    localStorage.setItem(abaAtual, JSON.stringify(posts));

    fecharModal();
    carregarTudo();
}

function responder(index) {
    let texto = prompt("Digite sua resposta:");
    if (!texto) return;

    let posts = JSON.parse(localStorage.getItem("pergunta") || "[]");

    posts[index].respostas.push({
        nome: usuario,
        texto
    });

    localStorage.setItem("pergunta", JSON.stringify(posts));
    carregarTudo();
}

function carregarTudo() {
    ["pergunta","materia","dever"].forEach(aba => {
        let lista = document.getElementById(aba);
        lista.innerHTML = "";

        let posts = JSON.parse(localStorage.getItem(aba) || "[]");

        if (posts.length === 0) {
            lista.innerHTML = `<div class="empty">Sem nenhuma postagem</div>`;
            return;
        }

        posts.forEach((p, i) => {
            let div = document.createElement("div");
            div.className = "post";

            div.innerHTML = `
                <div style="font-size:13px;color:#555;">${p.nome}</div>
                <div style="font-weight:bold;margin:5px 0;">${p.titulo}</div>
                <div>${p.desc}</div>
            `;

            if (aba === "pergunta") {
                let btnResp = document.createElement("button");
                btnResp.innerText = "Responder";
                btnResp.className = "responder-btn";
                btnResp.onclick = () => responder(i);
                div.appendChild(btnResp);

                let respostasDiv = document.createElement("div");
                respostasDiv.className = "respostas";

                (p.respostas || []).forEach(r => {
                    let rDiv = document.createElement("div");
                    rDiv.className = "resposta";
                    rDiv.innerText = `${r.nome}: ${r.texto}`;
                    respostasDiv.appendChild(rDiv);
                });

                div.appendChild(respostasDiv);
            }

            if (admin) {
                let btn = document.createElement("button");
                btn.innerText = "Excluir";
                btn.onclick = () => {
                    posts.splice(i, 1);
                    localStorage.setItem(aba, JSON.stringify(posts));
                    carregarTudo();
                };
                div.appendChild(btn);
            }

            lista.appendChild(div);
        });
    });

    atualizarFAB();
}

window.addEventListener("storage", () => {
    carregarTudo();
});
</script>

</body>
</html>
