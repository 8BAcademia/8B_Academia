<!DOCTYPE html> 
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Site Escolar</title>

<!-- META VIEWPORT PARA CELULAR -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI";
    background: #f5f9ff;
    font-size: 1rem; /* base para rem */
}

/* ANIMAÇÕES */
@keyframes fadeUp {
    from {opacity:0; transform: translateY(0.625rem);}
    to {opacity:1; transform: translateY(0);}
}

/* LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 2rem;
    border-radius: 0.875rem;
    width: 20rem;
    animation: fadeUp 0.4s;
}

.label { font-size: 0.8125rem; margin-bottom: 0.25rem; }

input, textarea {
    width: 100%;
    padding: 0.625rem;
    border: 0.125rem solid #4da6ff;
    border-radius: 0.5rem;
    margin-bottom: 0.75rem;
}

textarea { resize: none; }
input.error { border-color: red; }

/* BOTÕES */
.btn {
    background: #4da6ff;
    color: white;
    border: none;
    padding: 0.5rem 0.75rem;
    border-radius: 0.5rem;
    cursor: pointer;
    height: 2.25rem;
    font-size: 1rem;
}

.btn:hover { background: #1e90ff; }

/* HEADER */
.header {
    position: fixed;
    top: 0;
    width: 100%;
    background: white;
    display: flex;
    justify-content: space-between;
    padding: 0.625rem 1.25rem;
    z-index: 10;
}

.nav { display: flex; gap: 0.625rem; flex-wrap: wrap; }

.nav-item {
    padding: 0.5rem 0.875rem;
    border-radius: 0.5rem;
    cursor: pointer;
}

.nav-item.active {
    background: #4da6ff;
    color: white;
}

/* CONTENT */
.content { padding: 5rem 1.25rem; }

.tab { display: none; }
.tab.active { display: block; }

/* POST */
.post {
    background: white;
    padding: 0.9375rem;
    border-radius: 0.625rem;
    margin-bottom: 0.75rem;
    animation: fadeUp 0.3s;
    font-size: 1rem;
}

.respostas {
    margin-top: 0.625rem;
    padding-left: 0.625rem;
    border-left: 0.125rem solid #ddd;
}

.resposta { margin-top: 0.375rem; font-size: 0.875rem; }

/* RESPONDER */
.responder-box {
    display: flex;
    align-items: center;
    gap: 0.375rem;
    margin-top: 0.5rem;
}

.responder-box input { flex: 1; height: 2.25rem; }

/* SWITCH PEQUENO */
.switch-mini {
    width: 2rem;
    height: 1.125rem;
    background: #ccc;
    border-radius: 1.25rem;
    position: relative;
    cursor: pointer;
}

.switch-mini::after {
    content: "";
    width: 0.875rem;
    height: 0.875rem;
    background: white;
    position: absolute;
    top: 0.125rem;
    left: 0.125rem;
    border-radius: 50%;
    transition: 0.3s;
}

.switch-mini.active { background: #4da6ff; }
.switch-mini.active::after { left: 1rem; }

/* BOTÃO CRIAR */
.create-btn {
    position: fixed;
    bottom: 1.25rem;
    right: 1.25rem;
    padding: 0.875rem;
    border-radius: 0.75rem;
    background: #4da6ff;
    color: white;
    border: none;
    font-size: 1rem;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal.active { display: flex; }

.modal-box {
    background: white;
    padding: 1.25rem;
    border-radius: 0.75rem;
    width: 20rem;
    animation: fadeUp 0.3s;
}

.modal-box button { margin-top: 0.75rem; }

/* MENSAGENS DE ERRO */
.msg-erro {
    color: red;
    margin-bottom: 0.5rem;
    font-size: 0.8125rem;
}

/* RESPONSIVO PARA CELULAR E TABLET */
@media (max-width: 768px) {
    body { font-size: 1.125rem; }

    .login-box, .modal-box { width: 90%; padding: 2rem; }

    input, textarea, .responder-box input {
        padding: 0.875rem; font-size: 1.125rem; height: 3rem;
    }

    .btn { padding: 0.75rem 1rem; font-size: 1.125rem; height: 3rem; }

    .nav-item { padding: 0.75rem 1rem; font-size: 1rem; }

    .create-btn { padding: 1rem; font-size: 1.25rem; }

    .responder-box button { padding: 0.75rem 1rem; font-size: 1rem; }

    .post { padding: 1.25rem; font-size: 1.125rem; }
    .respostas { padding-left: 0.875rem; }
}
</style>
</head>

<body>

<div id="loginScreen" class="login-container">
    <div class="login-box">
        <h2>Entrar</h2>

        <div class="label">Nome (Favor colocar seu nome real)</div>
        <input id="user">
        <div id="userErro" class="msg-erro"></div>

        <div class="label">Senha</div>
        <input id="pass" type="password">
        <div id="erro" class="msg-erro"></div>

        <button class="btn" onclick="login()">Entrar</button>
    </div>
</div>

<div id="app" style="display:none">
    <div class="header">
        <div class="nav">
            <div class="nav-item active" onclick="trocar('pergunta', this)">Perguntas</div>
            <div class="nav-item" onclick="trocar('materia', this)">Matéria</div>
            <div class="nav-item" onclick="trocar('dever', this)">Dever</div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
            <span id="adminLabel" style="color:black; font-weight:bold; display:none;">ADMIN</span>
            <button class="btn" onclick="logout()">Sair</button>
        </div>
    </div>

    <div class="content">
        <div id="pergunta" class="tab active"></div>
        <div id="materia" class="tab"></div>
        <div id="dever" class="tab"></div>
    </div>

    <button class="create-btn" onclick="abrirModal()">+ Criar</button>
</div>

<div id="modal" class="modal" onclick="fecharFora(event)">
    <div class="modal-box">
        <h3>Criar postagem</h3>

        <div class="label">Título</div>
        <input id="titulo">
        <div id="tituloErro" class="msg-erro"></div>

        <div class="label">Descrição</div>
        <textarea id="desc"></textarea>
        <div id="descErro" class="msg-erro"></div>

        <div style="display:flex;justify-content:space-between;align-items:center;">
            <span>Anônimo?</span>
            <div id="anonBtn" class="switch-mini" onclick="toggleAnon()"></div>
        </div>

        <button class="btn" onclick="enviar()">Publicar</button>
    </div>
</div>

<script>
let usuario = "";
let admin = false;
let aba = "pergunta";
let anon = false;

window.onload = () => {
    let saved = JSON.parse(localStorage.getItem("login"));
    if(saved){
        usuario = saved.usuario;
        admin = saved.admin;
        if(admin) document.getElementById("adminLabel").style.display = "inline";
        loginScreen.style.display="none";
        app.style.display="block";
        carregar();
    }
};

function login(){
    let nome = user.value.trim();
    let senha = pass.value;
    user.classList.remove("error"); userErro.innerText=""; erro.innerText="";

    if(!nome){ userErro.innerText="Insira um nome de usuário válido"; user.classList.add("error"); return; }

    if(senha==="Turma8B") admin=false;
    else if(senha==="8B_adm") admin=true;
    else{ erro.innerText="Senha incorreta"; pass.classList.add("error"); return; }

    usuario = nome;
    localStorage.setItem("login", JSON.stringify({usuario,admin}));
    if(admin) document.getElementById("adminLabel").style.display = "inline";

    loginScreen.style.display="none";
    app.style.display="block";
    carregar();
}

function logout(){ localStorage.removeItem("login"); location.reload(); }

function trocar(t, el){
    aba = t;
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.getElementById(t).classList.add("active");
    document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
    el.classList.add("active");
}

function abrirModal(){ 
    tituloErro.innerText=""; descErro.innerText="";
    titulo.classList.remove("error"); desc.classList.remove("error");
    modal.classList.add("active"); 
}

function fecharFora(e){ if(e.target.id==="modal") modal.classList.remove("active"); }

function toggleAnon(){ anon = !anon; anonBtn.classList.toggle("active"); }

function enviar(){
    let t = titulo.value.trim();
    let d = desc.value.trim();
    tituloErro.innerText=""; descErro.innerText="";
    titulo.classList.remove("error"); desc.classList.remove("error");

    if(!t || !d){
        if(!t){ tituloErro.innerText="Insira um título"; titulo.classList.add("error"); }
        if(!d){ descErro.innerText="Insira uma descrição"; desc.classList.add("error"); }
        return;
    }

    let posts = JSON.parse(localStorage.getItem(aba)||"[]");
    posts.unshift({ nome: anon?"Anônimo":usuario, titulo: t, desc: d, respostas: [] });
    localStorage.setItem(aba, JSON.stringify(posts));

    titulo.value=""; desc.value=""; anon=false; anonBtn.classList.remove("active");
    modal.classList.remove("active");
    carregar();
}

function responder(index){
    let input = document.getElementById("resp-"+index);
    let texto = input.value.trim();
    let anonResp = document.getElementById("anonResp-"+index).classList.contains("active");
    if(!texto){ alert("Escreva algo antes de continuar"); return; }

    let posts = JSON.parse(localStorage.getItem(aba)||"[]");
    posts[index].respostas.push({ nome: anonResp?"Anônimo":usuario, texto });
    localStorage.setItem(aba, JSON.stringify(posts));
    carregar();
}

function carregar(){
    ["pergunta","materia","dever"].forEach(a=>{
        let div = document.getElementById(a); div.innerHTML="";
        let posts = JSON.parse(localStorage.getItem(a)||"[]");

        if(posts.length===0){ div.innerHTML=`<div>Sem nenhuma postagem</div>`; return; }

        posts.forEach((p,i)=>{
            let respostasHTML = ""; p.respostas.forEach(r=>{ respostasHTML += `<div class="resposta"><b>${r.nome}:</b> ${r.texto}</div>`; });

            let el = document.createElement("div"); el.className="post";
            el.innerHTML=`
                <b>${p.nome}</b>
                <div>${p.titulo}</div>
                <div>${p.desc}</div>
                <div class="respostas">${respostasHTML}</div>
                <div class="responder-box">
                    <input id="resp-${i}" placeholder="Responder...">
                    <div id="anonResp-${i}" class="switch-mini" onclick="this.classList.toggle('active')"></div>
                    <button class="btn" onclick="responder(${i})">Enviar</button>
                </div>
            `;
            if(admin){
                let b = document.createElement("button");
                b.className="btn"; b.innerText="Excluir";
                b.onclick=()=>{ posts.splice(i,1); localStorage.setItem(a, JSON.stringify(posts)); carregar(); };
                el.appendChild(b);
            }
            div.appendChild(el);
        });
    });
}

window.addEventListener("storage", carregar);
</script>

</body>
</html>
