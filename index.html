<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Escolar</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI";
    background: #f5f9ff;
}

/* LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

label {
    font-size: 13px;
    font-weight: 600;
}

input, textarea {
    width: 100%;
    padding: 8px;
    border: 2px solid #4da6ff;
    border-radius: 6px;
    margin-bottom: 10px;
}

/* ERRO */
input.error {
    border-color: red;
}

.erro {
    color: red;
    font-size: 13px;
    margin-bottom: 10px;
}

/* BOTÃO */
button {
    cursor: pointer;
    border: none;
}

/* APP */
.app { display: none; }

/* NAV */
.nav {
    display: flex;
    justify-content: center;
    gap: 15px;
    background: white;
    padding: 12px;
}

.nav-item {
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
}

.nav-item:hover {
    background: #e6f2ff;
}

.nav-item.active {
    background: #4da6ff;
    color: white;
}

/* CONTEÚDO */
.content {
    padding: 20px;
}

.tab { display: none; }
.tab.active { display: block; }

/* POST */
.post {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

/* VAZIO */
.empty {
    text-align: center;
    color: #777;
    margin-top: 40px;
}

/* BOTÃO + */
.fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #4da6ff;
    color: white;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    font-size: 26px;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: none;
    align-items: center;
    justify-content: center;
}

.modal-box {
    background: white;
    padding: 25px;
    border-radius: 14px;
    width: 340px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    animation: aparecer 0.2s ease;
}

@keyframes aparecer {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    font-size: 13px;
    margin-bottom: 4px;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 10px;
    border: 2px solid #4da6ff;
    border-radius: 8px;
}

textarea {
    resize: none;
    height: 90px;
}

/* SWITCH */
.switch-area {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.switch {
    position: relative;
    width: 40px;
    height: 22px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    background: #ccc;
    border-radius: 20px;
    inset: 0;
    transition: 0.3s;
}

.slider::before {
    content: "";
    position: absolute;
    width: 16px;
    height: 16px;
    background: white;
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: 0.3s;
}

.switch input:checked + .slider {
    background: #4da6ff;
}

.switch input:checked + .slider::before {
    transform: translateX(18px);
}

/* BOTÕES MODAL */
.modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}

.btn-primary {
    background: #4da6ff;
    color: white;
    padding: 8px 14px;
    border-radius: 8px;
}

.btn-secondary {
    background: #ddd;
    padding: 8px 14px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div id="loginScreen" class="login-container">
    <div class="login-box">
        <h2>Entrar</h2>

        <label>Nome</label>
        <input id="user">

        <label>Senha</label>
        <input id="pass" type="password">
        <div id="erro" class="erro"></div>

        <button onclick="login()">Entrar</button>
    </div>
</div>

<div id="app" class="app">

    <div class="nav">
        <div class="nav-item active" onclick="trocar('pergunta', this)">Perguntas</div>
        <div class="nav-item" onclick="trocar('materia', this)">Matéria</div>
        <div class="nav-item" onclick="trocar('dever', this)">Dever</div>
    </div>

    <div class="content">
        <div id="pergunta" class="tab active"></div>
        <div id="materia" class="tab"></div>
        <div id="dever" class="tab"></div>
    </div>

    <button id="fab" class="fab" onclick="abrirModal()">+</button>
</div>

<div id="modal" class="modal">
    <div class="modal-box">

        <h2>Criar postagem</h2>

        <div class="form-group">
            <label>Título</label>
            <input id="titulo" placeholder="Qual o título da postagem?">
        </div>

        <div class="form-group">
            <label>Descrição</label>
            <textarea id="desc" placeholder="Escreva sua dúvida aqui"></textarea>
        </div>

        <div class="switch-area">
            <span>Postagem anônima</span>
            <label class="switch">
                <input type="checkbox" id="anon">
                <span class="slider"></span>
            </label>
        </div>

        <div class="modal-actions">
            <button class="btn-secondary" onclick="fecharModal()">Cancelar</button>
            <button class="btn-primary" onclick="postar()">Postar</button>
        </div>

    </div>
</div>

<script>
let usuario = "";
let admin = false;
let abaAtual = "pergunta";

function login() {
    let senha = document.getElementById("pass");
    let erro = document.getElementById("erro");

    senha.classList.remove("error");
    erro.innerText = "";

    if (senha.value === "Turma8B") {
        admin = false;
    } else if (senha.value === "8B_adm") {
        admin = true;
    } else {
        senha.classList.add("error");
        erro.innerText = "Senha incorreta, tente novamente";
        return;
    }

    usuario = document.getElementById("user").value || "Usuário";

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";

    carregarTudo();
}

function trocar(tab, el) {
    abaAtual = tab;

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(tab).classList.add("active");

    document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
    el.classList.add("active");

    atualizarFAB();
}

function atualizarFAB() {
    let fab = document.getElementById("fab");

    if (abaAtual === "pergunta") {
        fab.style.display = "block";
    } else if (admin) {
        fab.style.display = "block";
    } else {
        fab.style.display = "none";
    }
}

function abrirModal() {
    document.getElementById("modal").style.display = "flex";
}

function fecharModal() {
    document.getElementById("modal").style.display = "none";
}

function postar() {
    let titulo = document.getElementById("titulo").value;
    let desc = document.getElementById("desc").value;
    let anon = document.getElementById("anon").checked;

    if (!titulo || !desc) return;

    let nome = anon ? "Anônimo" : usuario;

    let posts = JSON.parse(localStorage.getItem(abaAtual) || "[]");

    posts.unshift({ nome, titulo, desc });

    localStorage.setItem(abaAtual, JSON.stringify(posts));

    fecharModal();
    carregarTudo();

    document.getElementById("titulo").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("anon").checked = false;
}

function carregarTudo() {
    ["pergunta","materia","dever"].forEach(aba => {
        let lista = document.getElementById(aba);
        lista.innerHTML = "";

        let posts = JSON.parse(localStorage.getItem(aba) || "[]");

        if (posts.length === 0) {
            lista.innerHTML = `<div class="empty">Sem nenhuma postagem</div>`;
            return;
        }

        posts.forEach((p, i) => {
            let div = document.createElement("div");
            div.className = "post";

            div.innerHTML = `
                <div style="font-size:13px;color:#555;">${p.nome}</div>
                <div style="font-weight:bold;margin:5px 0;">${p.titulo}</div>
                <div>${p.desc}</div>
            `;

            if (admin && aba === "pergunta") {
                let btn = document.createElement("button");
                btn.innerText = "Excluir";

                btn.onclick = () => {
                    posts.splice(i, 1);
                    localStorage.setItem(aba, JSON.stringify(posts));
                    carregarTudo();
                };

                div.appendChild(btn);
            }

            lista.appendChild(div);
        });
    });

    atualizarFAB();
}

window.addEventListener("storage", () => {
    carregarTudo();
});
</script>

</body>
</html>
