<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Escolar</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI";
    background: #f5f9ff;
}

/* LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

label {
    font-size: 13px;
    font-weight: 600;
}

input, textarea {
    width: 100%;
    padding: 8px;
    border: 2px solid #4da6ff;
    border-radius: 6px;
    margin-bottom: 10px;
}

input.error {
    border-color: red;
}

button {
    background: #4da6ff;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

/* APP */
.app { display: none; }

.nav {
    background: white;
    padding: 10px;
    display: flex;
    gap: 10px;
}

.nav-btn {
    background: transparent;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
}

.nav-btn.active {
    background: #4da6ff;
    color: white;
}

.content {
    padding: 20px;
}

.tab { display: none; }
.tab.active { display: block; }

/* POST */
.post {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* BOTÃO + */
.fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #4da6ff;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    font-size: 24px;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: none;
    align-items: center;
    justify-content: center;
}

.modal-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 320px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-container">
    <div class="login-box">
        <h2>Entrar</h2>

        <label>Nome</label>
        <input id="user">

        <label>Senha</label>
        <input id="pass" type="password">
        <div id="erro" style="color:red"></div>

        <button onclick="login()">Entrar</button>
    </div>
</div>

<!-- APP -->
<div id="app" class="app">

    <div class="nav">
        <button class="nav-btn active" onclick="trocar('pergunta', this)">Perguntas</button>
        <button class="nav-btn" onclick="trocar('materia', this)">Matéria</button>
        <button class="nav-btn" onclick="trocar('dever', this)">Dever</button>
    </div>

    <div class="content">
        <div id="pergunta" class="tab active"></div>
        <div id="materia" class="tab">Somente administradores podem postar matérias</div>
        <div id="dever" class="tab">Somente administradores podem postar deveres</div>
    </div>

    <button id="fab" class="fab" onclick="abrirModal()">+</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-box">

        <h3>Criar postagem</h3>

        <label>Título</label>
        <input id="titulo">

        <label>Descrição</label>
        <textarea id="desc"></textarea>

        <label>
            <input type="checkbox" id="anon"> Postagem anônima
        </label>

        <button onclick="postar()">Postar</button>
        <button onclick="fecharModal()">Cancelar</button>

    </div>
</div>

<script>
let usuario = "";
let admin = false;

/* LOGIN */
function login() {
    let senha = document.getElementById("pass");
    let erro = document.getElementById("erro");

    senha.classList.remove("error");
    erro.innerText = "";

    if (senha.value === "Turma8B") {
        admin = false;
    } else if (senha.value === "8B_adm") {
        admin = true;
    } else {
        senha.classList.add("error");
        erro.innerText = "Senha incorreta, tente novamente";
        return;
    }

    usuario = document.getElementById("user").value || "Usuário";

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";

    carregarPosts();
}

/* ABAS */
function trocar(tab, el) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(tab).classList.add("active");

    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    el.classList.add("active");

    // botão + só nas perguntas
    document.getElementById("fab").style.display = (tab === "pergunta") ? "block" : "none";
}

/* MODAL */
function abrirModal() {
    document.getElementById("modal").style.display = "flex";
}

function fecharModal() {
    document.getElementById("modal").style.display = "none";
}

/* POSTAR */
function postar() {
    let titulo = document.getElementById("titulo").value;
    let desc = document.getElementById("desc").value;
    let anon = document.getElementById("anon").checked;

    if (!titulo || !desc) return;

    let nome = anon ? "Anônimo" : usuario;

    let posts = JSON.parse(localStorage.getItem("posts") || "[]");

    posts.unshift({ nome, titulo, desc });

    localStorage.setItem("posts", JSON.stringify(posts));

    fecharModal();
    carregarPosts();

    document.getElementById("titulo").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("anon").checked = false;
}

/* CARREGAR */
function carregarPosts() {
    let lista = document.getElementById("pergunta");
    lista.innerHTML = "";

    let posts = JSON.parse(localStorage.getItem("posts") || "[]");

    posts.forEach((p, i) => {
        let div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
            <div style="font-size:13px;color:#555;">${p.nome}</div>
            <div style="font-weight:bold;margin:5px 0;">${p.titulo}</div>
            <div>${p.desc}</div>
        `;

        if (admin) {
            let btn = document.createElement("button");
            btn.innerText = "Excluir";
            btn.style.marginTop = "10px";

            btn.onclick = () => {
                posts.splice(i, 1);
                localStorage.setItem("posts", JSON.stringify(posts));
                carregarPosts();
            };

            div.appendChild(btn);
        }

        lista.appendChild(div);
    });
}

/* SINCRONIZA ENTRE ABAS */
window.addEventListener("storage", (e) => {
    if (e.key === "posts") carregarPosts();
});
</script>

</body>
</html>
